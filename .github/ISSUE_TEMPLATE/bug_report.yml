name: Bug report
description:
  Report a reproducible problem with the nyc-mesh package, CLI, docs, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for someone else to reproduce the issue.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The CityGML export fails when...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description:
        Share the exact steps, command, or code path that reproduces the issue.
      placeholder: |
        1. Install `nyc-mesh`
        2. Run `nyc-mesh ...`
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description:
        Include Python version, install method, OS, and any other relevant context.
      placeholder: Python 3.12, uv editable install, macOS 15...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Paste stack traces, CLI output, or screenshots if they help.
